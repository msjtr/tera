<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TERA</title>

  <!-- الخطوط -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">




<body>



<!-- ========================================================= -->
<!--                 نظام القائمة الجانبية — TERA              -->
<!-- ========================================================= -->


<!-- ================= HEADER ================= -->
<header class="tera-header">

  <!-- زر فتح القائمة -->
  <button
    id="menuToggle"
    class="tera-menu-toggle"
    aria-label="فتح القائمة"
    aria-expanded="false">

    <span class="line l1"></span>
    <span class="line l2"></span>
    <span class="line l3"></span>

  </button>

</header>



<!-- ================= طبقة التعتيم ================= -->
<div id="teraOverlay" class="tera-overlay"></div>



<!-- ================= SIDEBAR ================= -->
<div
  id="teraSidebar"
  class="tera-sidebar"
  aria-hidden="true"
  tabindex="-1">

  <div class="tera-sidebar-inner">


    <!-- زر الإغلاق -->
    <button
      id="teraClose"
      class="tera-close-btn"
      aria-label="إغلاق القائمة">
      ✕
    </button>



    <!-- ================= شعار تيرا ================= -->
    <div class="tera-logo-box">

      <img
        src="Images/logo.svg"
        class="tera-sidebar-logo"
        alt="TERA Logo">

    </div>



    <!-- ================================================= -->
    <!--            القائمة القابلة للتمرير (Scroll)        -->
    <!-- ================================================= -->
    <ul class="tera-sidebar-menu">


      <!-- عن تيرا -->
      <li class="tera-has-submenu">

        <button class="tera-menu-item" type="button">

          <span class="tera-text">عن تيرا</span>
          <span class="tera-arrow">⌄</span>

        </button>

        <ul class="tera-submenu">

          <li>
            <a href="#about">
              <span class="tera-text">من نحن</span>
            </a>
          </li>

          <li>
            <a href="#vision">
              <span class="tera-text">رؤيتنا</span>
            </a>
          </li>

          <li>
            <a href="#goals">
              <span class="tera-text">أهدافنا</span>
            </a>
          </li>

        </ul>

      </li>



      <!-- ما يميزنا -->
      <li>
        <a href="#features" class="tera-menu-link">
          <span class="tera-text">ما يميزنا</span>
        </a>
      </li>



      <!-- إحصائياتنا -->
      <li>
        <a href="#stats" class="tera-menu-link">
          <span class="tera-text">إحصائياتنا</span>
        </a>
      </li>



      <!-- معايير تيرا -->
      <li>
        <a href="#standards" class="tera-menu-link">
          <span class="tera-text">معايير تيرا</span>
        </a>
      </li>



      <!-- آراء العملاء -->
      <li>
        <a href="#clients" class="tera-menu-link">
          <span class="tera-text">آراء عملائنا</span>
        </a>
      </li>



      <!-- تواصل معنا -->
      <li class="tera-has-submenu">

        <button class="tera-menu-item" type="button">

          <span class="tera-text">تواصل معنا</span>
          <span class="tera-arrow">⌄</span>

        </button>

        <ul class="tera-submenu">

          <li>
            <a href="#channels">
              <span class="tera-text">القنوات الرسمية</span>
            </a>
          </li>

          <li>
            <a href="#ticket">
              <span class="tera-text">فتح تذكرة</span>
            </a>
          </li>

        </ul>

      </li>



      <!-- وسائل الدفع -->
      <li>
        <a href="#payment" class="tera-menu-link">
          <span class="tera-text">وسائل الدفع</span>
        </a>
      </li>


    </ul>



    <!-- ================================================= -->
    <!--          زر تسجيل الدخول (ثابت أسفل الصندوق)       -->
    <!-- ================================================= -->

    <div class="tera-login-item">

      <a
        href="https://tera-services.com.sa/login?next=/"
        class="tera-login-link"
        target="_blank"
        rel="noopener noreferrer">

        تسجيل الدخول

      </a>

    </div>



  </div>
</div>
